<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Vexi</title>
<meta name="description" content="Page not found — Vexi AI coding agent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--ink:#0c1320;--ink2:#4a5568;--ink3:#8b95a7;
  --blue:#2979FF;--blue-dark:#1b5fd9;--term-bg:#0a0c12;
  --sans:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}
.container{max-width:1080px;margin:0 auto;padding:0 24px}

nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.85);backdrop-filter:blur(14px);border-bottom:1px solid #e3e9f2}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px}
.brand{font-weight:800;font-size:21px;letter-spacing:1px;color:var(--blue)}

main{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 24px}
.box{text-align:center;max-width:520px}
.term-404{display:inline-block;background:var(--term-bg);border-radius:14px;padding:28px 40px;font-family:var(--mono);font-size:64px;font-weight:700;color:#5b9aff;margin-bottom:32px;box-shadow:0 20px 60px rgba(12,19,32,.25);letter-spacing:4px}
.box h1{font-size:28px;font-weight:800;letter-spacing:-0.5px;margin-bottom:12px}
.box p{font-size:16px;color:var(--ink2);margin-bottom:32px}
.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--blue);color:#fff;font-size:15px;font-weight:600;padding:12px 24px;border-radius:10px;transition:all .15s;box-shadow:0 6px 20px rgba(41,121,255,.28)}
.btn-primary:hover{background:var(--blue-dark);transform:translateY(-2px)}
.btn-ghost{display:inline-flex;align-items:center;gap:8px;background:#fff;color:var(--ink);border:1px solid #d3dcea;font-size:15px;font-weight:600;padding:12px 24px;border-radius:10px;transition:all .15s}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue)}

footer{border-top:1px solid #e3e9f2;padding:24px;text-align:center;font-size:13px;color:var(--ink3)}
footer a{color:var(--blue);font-weight:600}
</style>
</head>
<body>

<nav>
  <div class="container nav-inner">
    <a href="/" class="brand">VEXI</a>
  </div>
</nav>

<main>
  <div class="box">
    <div class="term-404">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or was moved.</p>
    <div class="actions">
      <a href="/" class="btn-primary">Back to home</a>
      <a href="https://github.com/Elomami1976/vexi" target="_blank" class="btn-ghost">GitHub</a>
    </div>
  </div>
</main>

<footer>
  © 2026 Vexi · MIT License · <a href="https://github.com/Elomami1976/vexi">GitHub</a>
</footer>

</body>
</html>
